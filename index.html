<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>USDC POWER BANK</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:linear-gradient(135deg,#020617,#07111f,#0f172a);
min-height:100vh;
color:white;
overflow:hidden;
}

.bg{
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at 20% 20%,rgba(0,255,170,.15),transparent 25%),
radial-gradient(circle at 80% 30%,rgba(0,255,170,.12),transparent 25%),
radial-gradient(circle at 50% 80%,rgba(0,255,170,.10),transparent 25%);
animation:move 8s infinite alternate;
}

@keyframes move{
from{transform:translateY(-20px);}
to{transform:translateY(20px);}
}

.container{
position:relative;
z-index:2;
text-align:center;
padding-top:50px;
}

h1{
font-size:70px;
color:#00ff99;
text-shadow:0 0 20px #00ff99;
margin-bottom:40px;
animation:pulse 2s infinite;
}

@keyframes pulse{
50%{transform:scale(1.03);}
}

.cards{
display:flex;
justify-content:center;
gap:25px;
flex-wrap:wrap;
margin-bottom:40px;
}

.card{
width:250px;
padding:25px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
box-shadow:0 0 25px rgba(0,255,150,.25);
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 0 40px rgba(0,255,150,.5);
}

.label{
font-size:22px;
margin-bottom:15px;
}

.value{
font-size:42px;
color:#00ff99;
font-weight:bold;
}

.countdown{
width:450px;
max-width:90%;
margin:auto;
padding:30px;
border-radius:25px;
background:rgba(255,255,255,0.06);
box-shadow:0 0 30px rgba(0,255,150,.3);
}

.countdown h2{
margin-bottom:15px;
}

#timer{
font-size:55px;
color:yellow;
font-weight:bold;
}

.buttons{
margin-top:30px;
}

.btn{
display:inline-block;
padding:14px 28px;
margin:8px;
border-radius:12px;
text-decoration:none;
font-weight:bold;
color:black;
background:#00ff99;
}

.btn:hover{
transform:scale(1.05);
}

@media(max-width:768px){
h1{
font-size:42px;
}
#timer{
font-size:35px;
}
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

<h1>⚡ USDC POWER BANK ⚡</h1>

<div class="cards">

<div class="card">
<div class="label">Market Cap</div>
<div class="value">$0</div>
</div>

<div class="card">
<div class="label">Holders</div>
<div class="value">0</div>
</div>

<div class="card">
<div class="label">DEX Paid At</div>
<div class="value">$20K</div>
</div>

</div>

<div class="countdown">
<h2>Launch Countdown</h2>
<div id="timer">10:00</div>
</div>

<div class="buttons">
<a class="btn" href="#">BUY NOW</a>
<a class="btn" href="#">TELEGRAM</a>
<a class="btn" href="#">X / TWITTER</a>
</div>

</div>

<script>
let time=600;

setInterval(()=>{
let m=Math.floor(time/60);
let s=time%60;

document.getElementById("timer").innerHTML=
String(m).padStart(2,'0')+":"+
String(s).padStart(2,'0');

if(time>0){
time--;
}
},1000);
</script>

</body>
</html>

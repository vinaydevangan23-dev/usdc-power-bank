<!DOCTYPE html>
<html>
<head>
<title>USDC POWER BANK</title>
<style>
body{
background:#0d1117;
color:white;
font-family:Arial,sans-serif;
text-align:center;
padding-top:50px;
}

h1{
font-size:60px;
color:#00ff88;
}

.card{
width:400px;
margin:auto;
background:#161b22;
padding:20px;
border-radius:20px;
}

.value{
font-size:35px;
color:#00ff88;
}

.countdown{
font-size:30px;
color:yellow;
margin-top:20px;
}
</style>
</head>

<body>

<h1>⚡ USDC POWER BANK ⚡</h1>

<div class="card">
<h2>Market Cap</h2>
<div class="value">$0</div>

<h2>Holders</h2>
<div class="value">0</div>

<h2>DEX Paid At</h2>
<div class="value">$20,000 MC</div>

<div class="countdown" id="timer"></div>
</div>

<script>
var countDownDate = new Date().getTime() + 86400000;

var x = setInterval(function() {

var now = new Date().getTime();
var distance = countDownDate - now;

var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
var seconds = Math.floor((distance % (1000 * 60)) / 1000);

document.getElementById("timer").innerHTML =
hours + "h " + minutes + "m " + seconds + "s ";

}, 1000);
</script>

</body>
</html>
